<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | SWOT</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fa-solid fa-layer-group"></i> <span>SWOT</span></div></div>
            <nav class="nav-menu">
                <a href="home.html" class="nav-item"><i class="fa-solid fa-grid-2"></i> Dashboard</a>
                <a href="my-swot.html" class="nav-item"><i class="fa-solid fa-bolt"></i> My Matrix</a>
                <a href="goals.html" class="nav-item"><i class="fa-solid fa-bullseye"></i> Goals</a>
                <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <a href="journal.html" class="nav-item active"><i class="fa-solid fa-book"></i> Journal</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Daily Journal</h1>
            </header>
            <div class="bento-card" style="height: auto;">
                <div class="form-group">
                    <label>Today's Title</label>
                    <input type="text" class="form-input" placeholder="e.g., A breakthrough in coding...">
                </div>
                <div class="form-group">
                    <label>Entry</label>
                    <textarea class="form-textarea" placeholder="Write your thoughts here..."></textarea>
                </div>
                <button class="btn btn-white" style="background: var(--primary); color: white;">Save Entry</button>
            </div>
        </main>
    </div>
</body>
</html>
